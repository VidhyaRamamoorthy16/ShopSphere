version: '3.8'

services:
  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: gateway_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - gateway_network

  # Main API Gateway (Port 5001)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    ports:
      - "5001:5001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - RISK_THRESHOLD_HIGH=80.0
      - RISK_THRESHOLD_MEDIUM=40.0
      - THREAT_BLOCK_LIMIT=10
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./api-gateway:/app
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - gateway_network

  # Node.js Backend (Port 8000)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_server
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - PORT=8000
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - gateway_network

  # React Frontend (Port 5173)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
      - VITE_BACKEND_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api-gateway
      - backend
    restart: unless-stopped
    networks:
      - gateway_network

  # Admin Control Panel (Port 3000) - ISOLATED
  admin-panel:
    build:
      context: ./admin_frontend
      dockerfile: Dockerfile
    container_name: admin_panel
    ports:
      - "127.0.0.1:3000:3000"  # Bind to localhost only
    environment:
      - REACT_APP_ADMIN_URL=http://localhost:3000
      - REACT_APP_GATEWAY_URL=http://api-gateway:5001
    env_file:
      - .env
    depends_on:
      - api-gateway
      - redis
    volumes:
      - ./admin_frontend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - gateway_network

  # Nginx Reverse Proxy (Optional for production)
  nginx:
    image: nginx:alpine
    container_name: gateway_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api-gateway
      - frontend
    restart: unless-stopped
    networks:
      - gateway_network
    profiles:
      - production

  # Monitor API (Port 3000) - Separate monitoring backend
  monitor-api:
    build:
      context: ./monitor-api
      dockerfile: Dockerfile
    container_name: monitor_api
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - GATEWAY_URL=http://api-gateway:5001
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - redis
      - api-gateway
    volumes:
      - ./monitor-api:/app
    restart: unless-stopped
    networks:
      - gateway_network

  # Monitor Dashboard (Port 3001) - React UI for monitoring
  monitor-dashboard:
    build:
      context: ./monitor-dashboard
      dockerfile: Dockerfile
    container_name: monitor_dashboard
    ports:
      - "3001:3001"
    environment:
      - VITE_MONITOR_API_URL=http://localhost:3000
    depends_on:
      - monitor-api
    volumes:
      - ./monitor-dashboard:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - gateway_network

volumes:
  redis_data:
    driver: local

networks:
  gateway_network:
    driver: bridge
